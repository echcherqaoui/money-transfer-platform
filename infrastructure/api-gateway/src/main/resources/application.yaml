api:
  base-path: /api/v1

server:
  port: ${PORT}
  reactive:
    session:
      cookie:
        name: MONEY_TRANSFER_SESSION
        path: /
        http-only: true
        secure: ${SESSION_SECURE:false}
        same-site: lax

spring:
  application:
    name: api-gateway
  # ── Spring Session — uses Redis as session store ───────────────
  session:
    store-type: redis
    timeout: 1800s # 30 minutes (matches SSO Session Idle)
    redis:
      namespace: "money-transfer:gateway"
      flush-mode: on_save  # write to Redis only when session changes
      save-mode: always

  # ── Redis — stores JWT server-side (BFF pattern) ──────────────
  # Browser gets a SESSION cookie only
  data:
    redis:
      host: ${RD_HOST}
      port: ${RD_PORT}
      password: ${RD_PASSWORD}

  # ── Static routing ─────────────────────────────────────────────
  # Docker Compose service names resolve inside Docker network.
  # TokenRelay filter: extracts JWT from Redis session,
  cloud:
    gateway:
      server:
        webflux:
          # ── CORS — configured once here, not per service ────────────
          globalcors:
            corsConfigurations:
              '[/**]':
                allowedOrigins:
                  - ${FRONTEND_URL}
                allowedMethods: [GET, POST, PUT, DELETE, OPTIONS]
                allowedHeaders: ["Content-Type", "Accept", "X-Requested-With", "Authorization"]
                allowCredentials: true
                maxAge: 3600

          default-filters:
            - TokenRelay
            - SaveSession # Ensures session is persisted across calls
          routes:
            - id: transaction-service
              uri: http://transaction:${TRANSACTION_SERVICE_PORT}
              predicates:
                - Path=/api/v1/transfers/**

            - id: wallet-service
              uri: http://wallet:${WALLET_SERVICE_PORT}
              predicates:
                - Path=/api/v1/wallets/**

            - id: angular-frontend
              # host.docker.internal is the bridge to out of the container
              uri: http://host.docker.internal:4200
              predicates:
                - Path=/** # Send everything else to Angular
# ── Observability ─────────────────────────────────────────────────
management:
  server:
    port: ${MANAGEMENT_PORT}
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
  otlp:
    tracing:
      endpoint: http://tempo:4318/v1/traces
  tracing:
    sampling:
      probability: 1.0

logging:
  level:
    com.moneytransfer: DEBUG
    org.springframework.cloud.gateway: DEBUG
    org.springframework.security: DEBUG