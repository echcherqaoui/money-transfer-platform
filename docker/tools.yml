services:
  terraform:
    image: hashicorp/terraform:${TERRAFORM_VERSION}
    container_name: tf-kafka-manager
    environment:
      TF_VAR_kafka_broker: kafka-0:${KF_INTERNAL_PORT}
    volumes:
      - ../terraform:/workspace
    working_dir: /workspace
    networks:
      - money-transfer-net
    entrypoint: [ "terraform" ]

networks:
  money-transfer-net:
    external: true