server:
  port: ${PORT}

spring:
  application:
    name: transaction-service

  datasource:
    hikari:
      pool-name: HikariPool-transaction
    url: ${DATASOURCE_URL}
    username: ${DATASOURCE_USERNAME}
    password: ${DATASOURCE_PASSWORD}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    database: postgresql

  flyway:
    validate-on-migrate: true
    repair: true

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KC_INTERNAL_BASE_URL}/realms/${KC_REALM}/protocol/openid-connect/certs

  kafka:
    bootstrap-servers: ${KF_BOOTSTRAP_SERVERS}
    properties:
      schema.registry.url: ${SC_REGISTRY_URL}
      value.subject.name.strategy: io.confluent.kafka.serializers.subject.RecordNameStrategy
      auto.register.schemas: false
      use.latest.version: true

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: io.confluent.kafka.serializers.protobuf.KafkaProtobufSerializer

    consumer:
      group-id: ${KF_CONSUMER_GROUP_ID}
      auto-offset-reset: ${KF_AUTO_OFFSET_RESET:earliest}
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: io.confluent.kafka.serializers.protobuf.KafkaProtobufDeserializer


# Actuator — internal port, never publicly exposed
management:
  server:
    port: ${MANAGEMENT_PORT}
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
  otlp:
    tracing:
      endpoint: http://tempo:4318/v1/traces
  tracing:
    sampling:
      probability: 1.0

# ── Kafka topic names ────────────────────────────────────────────────────────
kafka:
  topics:
    # Transaction service events
    transaction:
      transfer-initiated: ${KF_TOPIC_PREFIX}.mtp.transaction.transfer.initiated.v1

    # Fraud service events
    fraud:
      transfer-detected: ${KF_TOPIC_PREFIX}.mtp.fraud.transfer.detected.v1

    # Wallet service events
    wallet:
      transfer-completed: ${KF_TOPIC_PREFIX}.mtp.wallet.transfer.completed.v1

# ── HMAC ─────────────────────────────────────────────────────────────────────
app:
  security:
    hmac:
      secret: ${HMAC_SECRET_KEY}