server:
  port: 0

spring:
  data:
    redis:
      host: localhost
      port: 6379

  kafka:
    bootstrap-servers: ${spring.embedded.kafka.brokers}
    consumer:
      auto-offset-reset: earliest
      group-id: fraud-test-group
      enable-auto-commit: false
    properties:
      schema.registry.url: mock://test-registry
      value.subject.name.strategy: io.confluent.kafka.serializers.subject.RecordNameStrategy

fraud:
  rules:
    amount-threshold-minor-units: 100000000
    velocity:
      max-transactions: 5
      window-minutes: 10
  idempotency:
    ttl-seconds: 86400

kafka:
  topics:
    transaction:
      transfer-initiated: test.mtp.transaction.transfer.initiated.v1
    fraud:
      transfer-detected: test.mtp.fraud.transfer.detected.v1
      transfer-approved: test.mtp.fraud.transfer.approved.v1

app:
  security:
    hmac:
      secret: test-secret-key

logging:
  level:
    com.moneytransfer: DEBUG

management:
  server:
    port: 0
